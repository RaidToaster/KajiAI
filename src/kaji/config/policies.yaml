# Execution governance policies per domain profile
# Each profile inherits from 'default' and may override values

default:
  max_search_calls: 5
  max_scrapes: 2
  allow_dynamic_browser: false
  max_execution_time_seconds: 120
  max_token_limit: 32000
  retry_on_failure: true
  max_retries: 3
  retry_delay_seconds: 2
  snippet_first: true
  scrape_fallback: true
  cost_ceiling_usd: 0.50

scientific:
  inherit: default
  max_search_calls: 8
  max_execution_time_seconds: 180
  snippet_first: true
  scrape_fallback: false
  require_https: true

political:
  inherit: default
  max_search_calls: 6
  max_scrapes: 3
  contradiction_mining: true
  require_cross_reference: true

health_medical:
  inherit: default
  max_search_calls: 8
  max_scrapes: 1
  require_peer_reviewed: true
  max_execution_time_seconds: 180

general:
  inherit: default
